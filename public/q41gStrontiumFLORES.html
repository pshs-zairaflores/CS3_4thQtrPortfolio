<!DOCTYPE html>
<html>
  <head> 
    <title>Movie Rating</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
      <h3 class="title">Add a Movie</h3>
      <form id="dForm">
        <label>Title <input type="text" id="movieTitle"></label><br>
        <label>Year <input type="number" id="movieYear"></label><br>
        <label>Movie Genre: 
          <select name="movieGenre" id="movieGenre">
            <option value="action">Action</option>
            <option value="horror">Horror</option>
            <option value="comedy">Comedy</option>
            <option value="fantasy">Fantasy</option>
            <option value="drama">Drama</option>
            <option value="romance">Romance</option>
            <option value="scifi">Sci-Fi</option>
            <option value="thriller">Thriller</option>
          </select>
        </label><br>

        <button> Submit </button>
      </form>
      <br/>
      
      <span>Searh for : </span><input type="text" id="searchTitle" placeholder="Enter a Title" /> 
      <button onclick="search()"> Display </button>
      <div id="listBooks"> </div>
      
      <script src="script.js"></script>
  </body>
</html>
