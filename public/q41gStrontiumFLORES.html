<!DOCTYPE html>
<html>
  <head> 
    <title>Movie Rating</title>
    <link rel="stylesheet" href="q41gStrontiumFLORES.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Add a Movie</h1>
        <label>Title <input type="text" id="movieTitle"></label><br>
        <label>Year <input type="number" id="movieYear"></label><br>
        <label>Movie Genre: 
          <select name="movieGenre" id="movieGenre">
            <option value="Action">Action</option>
            <option value="Horror">Horror</option>
            <option value="Comedy">Comedy</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Drama">Drama</option>
            <option value="Romance">Romance</option>
            <option value="SciFi">Sci-Fi</option>
            <option value="Thriller">Thriller</option>
          </select>
        </label><br>

        <label>Rating:</label>
        <div class="stars" id="ratingStars">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        

        <button onclick="addMovie()">Add Movie</button>

      <h1>Movie List</h1>
      <ul id="movieList"></ul>
    </div>
    <script>

      let selectedRating = 0;
      let movieList = JSON.parse(localStorage.getItem("movies")) || [];
      displayMovies(movieList);
      //Displays the existing inputted movies

      function addMovie() {
        let title = document.getElementById("movieTitle").value.trim();
        let year = document.getElementById("movieYear").value.trim();
        let genre = document.getElementById("movieGenre").value;
        //Just collects the data

        if(!title || !year || selectedRating ===0) {
          alert("Please fill in all fields.");
          return;
        }
        //Displays the alert for the user to fill out missing parts

        let addedMovie = {
          title: title,
          year: year,
          genre: genre,
          rating: selectedRating
        }
        //movi object

        selectedRating = 0;
        updateStars();
        document.getElementById("movieTitle").value= "";
        document.getElementById("movieYear").value= "";
        //To reset the whole form after submitting a movie input

        movieList = JSON.parse(localStorage.getItem("movies")) || [];
        movieList.push(addedMovie);
        localStorage.setItem("movies", JSON.stringify(movieList));
        displayMovies(movieList);
      }

      function displayMovies(list) {
        let output = "";
        for (let i = 0; i < list.length; i++) {
          output += `<li>
               ${list[i].title}
               (${list[i].year}) 
               - ${list[i].genre}, 
               <span>Rating:</span> ${"★".repeat(Math.round(Number(list[i].rating)))}</li>
               
               <button onclick="deleteMovie(${i})">Delete</button></li>`; //Just displays the delete button after a movie input
        }
        document.getElementById("movieList").innerHTML = output;
      }

      function deleteMovie(index) {
        let confirmed = confirm("Are you sure you want to delete?");
        if (confirmed) {
          movieList.splice(index, 1);
          localStorage.setItem("movies", JSON.stringify(movieList));
          displayMovies(movieList);
        }
      }

      document.querySelectorAll(".star").forEach(star => {
        star.addEventListener("click", function() {
          selectedRating = this.getAttribute("data-value");
          updateStars(selectedRating);
        });
      });
      //Updates the rating

      function updateStars(rating) {
        document.querySelectorAll(".star").forEach(star => {
          star.classList.remove("selected");
          if (star.getAttribute("data-value") <= rating) {
            star.classList.add("selected");
          }
        });
      }
      //Highlights the stars up to the selected rating value and ignores the rest

    </script>
  </body>
</html>
